# Security configuration for Open WebUI v0.6.5
# This file mitigates known vulnerabilities including XSS and CSRF

# Content Security Policy - Strict policy to prevent XSS
add_header Content-Security-Policy "
    default-src 'self';
    script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdn.jsdelivr.net;
    style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdn.jsdelivr.net;
    font-src 'self' https://fonts.gstatic.com;
    img-src 'self' data: blob: https:;
    connect-src 'self' ws: wss: http://localhost:* http://127.0.0.1:*;
    media-src 'self' blob:;
    object-src 'none';
    base-uri 'self';
    form-action 'self';
    frame-ancestors 'none';
    upgrade-insecure-requests;
" always;

# XSS Protection (critical for v0.6.5 XSS vulnerability)
add_header X-XSS-Protection "1; mode=block" always;
add_header X-Content-Type-Options "nosniff" always;
add_header X-Frame-Options "DENY" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;

# CSRF Protection
add_header X-CSRF-Token-Required "true" always;

# Prevent clickjacking
add_header X-Frame-Options "SAMEORIGIN" always;

# HSTS for HTTPS
add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

# Remove server information
server_tokens off;
more_clear_headers Server;