# Medical Assistant - Main Application (Your existing React app)
upstream medical_assistant_frontend {
    server host.docker.internal:5173;  # Vite dev server port
}

# Medical Assistant - API Backend (Your existing FastAPI)
upstream medical_assistant_api {
    server host.docker.internal:8000;  # Assuming FastAPI runs on 8000
}

# Open WebUI
upstream open_webui {
    server open-webui:8080;
}

# Main server block
server {
    listen 80;
    server_name localhost;
    
    # Security configurations for Open WebUI v0.6.5
    client_max_body_size 100M;
    proxy_read_timeout 300s;
    proxy_connect_timeout 75s;
    proxy_send_timeout 300s;
    
    # Rate limiting to mitigate potential attacks
    limit_req_zone $binary_remote_addr zone=openwebui:10m rate=10r/m;
    
    # Main Medical Assistant App (Your existing React frontend)
    location / {
        proxy_pass http://medical_assistant_frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # WebSocket support for your existing app
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
    
    # Medical Assistant API (Your existing FastAPI backend)
    location /api/ {
        proxy_pass http://medical_assistant_api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # WebSocket support for FastAPI
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
    
    # Open WebUI (AI Interface) - Accessible at /webui/
    location /webui/ {
        limit_req zone=openwebui burst=20 nodelay;
        
        # Security headers for XSS protection (important for v0.6.5)
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:;" always;
        
        # Strip /webui prefix when forwarding
        rewrite ^/webui/(.*)$ /$1 break;
        
        proxy_pass http://open_webui;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Prefix /webui;
        
        # WebSocket support for Open WebUI
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
    
    # Direct access to Open WebUI (alternative route)
    location /open-webui/ {
        limit_req zone=openwebui burst=20 nodelay;
        
        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        
        rewrite ^/open-webui/(.*)$ /$1 break;
        proxy_pass http://open_webui;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    
    # Health check endpoint
    location /health {
        access_log off;
        return 200 "Medical Assistant + Open WebUI - OK\n";
        add_header Content-Type text/plain;
    }
}