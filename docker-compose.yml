version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: chatapp_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: chatapp_db
      POSTGRES_USER: chatapp
      POSTGRES_PASSWORD: chatapp_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chatapp -d chatapp_db"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - medical_assistant_network

  # Optional: pgAdmin for database management
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: chatapp_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@chatapp.local
      PGADMIN_DEFAULT_PASSWORD: admin_password
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      - postgres
    profiles:
      - dev  # Only start with: docker-compose --profile dev up
    networks:
      - medical_assistant_network

  # Open WebUI v0.6.5 - AI Interface
  open-webui:
    image: ghcr.io/open-webui/open-webui:v0.6.5
    container_name: medical_open_webui
    restart: unless-stopped
    ports:
      - "3000:8080"  # Open WebUI accessible at http://localhost:3000
    environment:
      - WEBUI_SECRET_KEY=medical_assistant_secret_key_change_this
      - DATA_DIR=/app/backend/data
      # Security settings for v0.6.5
      - ENABLE_SIGNUP=false  # Disable public signup for security
      - DEFAULT_USER_ROLE=user
      # Optional: Connect to your existing database (if needed)
      - DATABASE_URL=postgresql://chatapp:chatapp_password@postgres:5432/chatapp_db
    volumes:
      - open_webui_data:/app/backend/data
      - ./open_webui_config:/app/backend/data/config  # Local config directory
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - medical_assistant_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # Nginx reverse proxy for security and routing
  nginx:
    image: nginx:alpine
    container_name: medical_nginx
    restart: unless-stopped
    ports:
      - "80:80"    # Main entry point
      - "443:443"  # HTTPS (configure SSL certificates as needed)
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
    depends_on:
      - open-webui
    networks:
      - medical_assistant_network
    profiles:
      - production  # Only start with: docker-compose --profile production up

networks:
  medical_assistant_network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

volumes:
  postgres_data:
    driver: local
  pgadmin_data:
    driver: local
  open_webui_data:
    driver: local