version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: chatapp_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: chatapp_db
      POSTGRES_USER: chatapp
      POSTGRES_PASSWORD: chatapp_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chatapp -d chatapp_db"]
      interval: 10s
      timeout: 5s
      retries: 3

  # Optional: pgAdmin for database management
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: chatapp_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@chatapp.local
      PGADMIN_DEFAULT_PASSWORD: admin_password
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      - postgres
    profiles:
      - dev  # Only start with: docker-compose --profile dev up

  # Open WebUI v0.6.5 - Basic Setup (Step 1)
  open-webui:
    image: ghcr.io/open-webui/open-webui:v0.6.5
    container_name: medical_open_webui
    restart: unless-stopped
    ports:
      - "3000:8080"  # Open WebUI accessible at http://localhost:3000
    environment:
      - WEBUI_SECRET_KEY=test_secret_key_123
      - ENABLE_SIGNUP=true  # Enable for initial testing
      - DEFAULT_USER_ROLE=user
    volumes:
      - open_webui_data:/app/backend/data

volumes:
  postgres_data:
    driver: local
  pgadmin_data:
    driver: local
  open_webui_data:
    driver: local