services:
  postgres:
    image: postgres:15-alpine
    container_name: chatapp_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: chatapp_db
      POSTGRES_USER: chatapp
      POSTGRES_PASSWORD: chatapp_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chatapp -d chatapp_db"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - chatapp_network

  # Optional: pgAdmin for database management
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: chatapp_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@chatapp.local
      PGADMIN_DEFAULT_PASSWORD: admin_password
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      - postgres
    profiles:
      - dev  # Only start with: docker-compose --profile dev up
    networks:
      - chatapp_network

  # FastAPI Backend Service
  backend:
    build: ./backend
    container_name: chatapp_backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - DATABASE_URL=postgresql://chatapp:chatapp_password@postgres:5432/chatapp_db
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\" || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - chatapp_network

  # Open WebUI Service (v0.6.5 - Free Version)
  open-webui:
    image: ghcr.io/open-webui/open-webui:v0.6.5
    container_name: chatapp_openwebui
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      - ENABLE_OLLAMA=true
      - WEBUI_SECRET_KEY=${WEBUI_SECRET_KEY:-medical-assistant-pro-demo-2024}
      - DEFAULT_MODELS=gpt-3.5-turbo,medical-assistant
      - ENABLE_SIGNUP=false
      - ENABLE_LOGIN_FORM=true
      - ENABLE_OAUTH=false
      - ENABLE_HEADERS_AUTH=false
      - ENABLE_OPENAI_API=true
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_API_BASE_URL=https://api.openai.com/v1
      - ENABLE_RAG=true
      - ENABLE_VOICE=true
      - ENABLE_IMAGE_GENERATION=true
      - ENABLE_WEB_SEARCH=true
      - ENABLE_FUNCTION_CALLING=true
      - ENABLE_COMMUNITY_SHARING=false
      - ENABLE_MODEL_FILTER=true
      - MODEL_FILTER_LIST=medical-assistant
      - WEBUI_NAME=Medical Assistant Pro
      - WEBUI_DESCRIPTION=AI-powered medical consultation platform with research capabilities
      - WEBUI_TITLE=Medical Assistant Pro
      - WEBUI_PRIMARY_COLOR=#2563eb
      - WEBUI_SECONDARY_COLOR=#1e40af
      - WEBUI_ACCENT_COLOR=#3b82f6
      - MEDICAL_ASSISTANT_ENABLED=true
      - MEDICAL_WORKFLOW_URL=http://backend:8000
      - MEDICAL_API_ENDPOINT=http://backend:8000/api/v1/chat
    volumes:
      - openwebui_data:/app/backend/data
      - openwebui_uploads:/app/backend/uploads
      - ./openwebui_functions:/app/backend/functions
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8080')\" || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - chatapp_network

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: chatapp_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - open-webui
      - backend
    networks:
      - chatapp_network

volumes:
  postgres_data:
    driver: local
  pgadmin_data:
    driver: local
  openwebui_data:
    driver: local
  openwebui_uploads:
    driver: local

networks:
  chatapp_network:
    driver: bridge